<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BriçÖğren - Türkçe</title>
<meta name="theme-color" content="#3a3a3a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BriçÖğren">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --green-table: #2d7a4f;
  --cream: #f5f0e8;
  --ink: #1a1a1a;
  --muted: #777;
  --border: #ddd;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Source Sans 3', sans-serif;
  background: #e0dbd2;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  padding: 20px 12px;
}

.book {
  background: var(--cream);
  width: 100%;
  max-width: 420px;
  min-height: 700px;
  border-radius: 4px;
  box-shadow: 0 6px 32px rgba(0,0,0,0.3);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* NAVBAR */
.navbar {
  background: #3a3a3a;
  color: white;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 14px;
  height: 50px;
  flex-shrink: 0;
}
.navbar .title {
  font-family: 'Source Sans 3', sans-serif;
  font-weight: 600;
  font-size: 17px;
  flex: 1;
  text-align: center;
}
.navbar .nav-btn {
  background: none; border: none; color: white;
  font-size: 22px; cursor: pointer; padding: 4px 6px; min-width: 30px;
}

/* PROGRESS */
.progress-bar { height: 4px; background: #ccc; flex-shrink: 0; }
.progress-bar-fill { height: 100%; background: #888; transition: width 0.3s; }

/* CONTENT */
.content {
  flex: 1;
  padding: 18px 16px 10px;
  font-size: 16.5px;
  line-height: 1.65;
  color: var(--ink);
  font-family: 'Lora', serif;
  overflow-y: auto;
}
.content p { margin-bottom: 15px; }
.content p:last-child { margin-bottom: 0; }
.content strong { font-weight: 700; }
.content em { font-style: italic; }
.content ul { margin: 0 0 15px 18px; }
.content li { margin-bottom: 8px; }

/* CHAPTER TITLE */
.chapter-title-page {
  display: flex; flex-direction: column;
  align-items: center; padding-top: 48px;
}
.chapter-label {
  font-family: 'Lora', serif; font-size: 15px;
  color: var(--muted); margin-bottom: 14px;
}
.chapter-title {
  font-family: 'Lora', serif; font-size: 26px;
  font-weight: 700; text-align: center;
}

/* ═══════════════════════════════
   CARD TABLE — fixed container, absolute compass positions
═══════════════════════════════ */
.table-diagram {
  background: var(--green-table);
  border-radius: 8px;
  margin-bottom: 14px;
  position: relative;
  height: 220px;
  overflow: hidden;
}

/* Info box: top-left */
.tbl-info {
  position: absolute; top: 7px; left: 7px;
  background: rgba(0,0,0,0.30);
  color: white; font-size: 10px; font-weight: 700;
  padding: 4px 7px; border-radius: 4px;
  line-height: 1.5; font-family: 'Source Sans 3', sans-serif;
  text-align: center; z-index: 2;
}

/* Score box: bottom-left */
.tbl-score {
  position: absolute; bottom: 7px; left: 7px;
  background: rgba(0,0,0,0.30);
  color: white; font-size: 10px; font-weight: 700;
  padding: 4px 7px; border-radius: 4px;
  line-height: 1.5; font-family: 'Source Sans 3', sans-serif;
  text-align: center; z-index: 2;
}

/* North: top center */
.hand-north {
  position: absolute;
  top: 8px;
  left: 68px; right: 68px;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-wrap: nowrap;
  z-index: 2;
}

/* South: bottom center — offset right to clear score box */
.hand-south {
  position: absolute;
  bottom: 8px;
  left: 68px; right: 8px;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-wrap: nowrap;
  z-index: 2;
}

/* West: vertically centered on left */
.hand-west {
  position: absolute;
  left: 7px;
  top: 50%; transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 3px;
  z-index: 2;
}

/* East: vertically centered on right */
.hand-east {
  position: absolute;
  right: 7px;
  top: 50%; transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 3px;
  z-index: 2;
}

/* Play area: dead center of table */
.tbl-center {
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  width: 100px;
  height: 90px;
  z-index: 3;
}

/* Play area inner: relative for absolute children */
.play-area {
  position: relative;
  width: 100%;
  height: 100%;
}

/* ── Horizontal mini card (N/S) ──
   Matches original: number on top row, suit symbol on bottom row
   White bg, colored text, tight width */
.card-h {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  background: white;
  border-radius: 3px;
  width: 17px;
  height: 27px;
  margin: 0 1px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.3);
  font-family: 'Source Sans 3', sans-serif;
  font-weight: 700;
  line-height: 1;
  padding: 2px 1px;
}
.card-h .cn { font-size: 9.5px; }
.card-h .cs { font-size: 10px; }

/* Gap between suits in N/S */
.suit-gap { width: 5px; display: inline-block; }

/* ── Vertical hand (W/E) — each card its own chip, suits in rows ── */
.hand-west, .hand-east {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.suit-line {
  display: flex;
  flex-direction: row;
  gap: 1px;
  align-items: center;
}
/* card chip for W/E — same as N/S but slightly smaller */
.card-v {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  background: white;
  border-radius: 3px;
  width: 15px;
  height: 22px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.3);
  font-family: 'Source Sans 3', sans-serif;
  font-weight: 700;
  line-height: 1;
  padding: 1px 1px;
  flex-shrink: 0;
}
.card-v .cn { font-size: 8px; }
.card-v .cs { font-size: 8px; }

/* ── Played cards: compass positions inside .play-area ── */

/* Each played card */
.pcard {
  position: absolute;
  background: white;
  border-radius: 5px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.4);
  font-family: 'Source Sans 3', sans-serif;
  font-weight: 700;
  width: 30px;
  height: 38px;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  justify-content: flex-start;
  padding: 2px 3px;
}
.pcard .prank { font-size: 12px; line-height: 1.1; }
.pcard .psym  { font-size: 13px; line-height: 1; }

/* Compass positions inside .play-area */
.pc-north {
  position: absolute;
  left: 50%; top: 4px;
  transform: translateX(-50%) rotate(-1deg);
}
.pc-south {
  position: absolute;
  left: 50%; bottom: 4px;
  transform: translateX(-50%) rotate(1deg);
}
.pc-west {
  position: absolute;
  left: 4px; top: 50%;
  transform: translateY(-50%) rotate(-3deg);
}
.pc-east {
  position: absolute;
  right: 4px; top: 50%;
  transform: translateY(-50%) rotate(3deg);
}

/* Fly-in animations — use top/left/right/bottom offsets only, keep transform for rotate */
@keyframes fly-north {
  from { opacity:0; top:-35px; }
  to   { opacity:1; top:4px; }
}
@keyframes fly-south {
  from { opacity:0; bottom:-35px; }
  to   { opacity:1; bottom:4px; }
}
@keyframes fly-west {
  from { opacity:0; left:-35px; }
  to   { opacity:1; left:4px; }
}
@keyframes fly-east {
  from { opacity:0; right:-35px; }
  to   { opacity:1; right:4px; }
}

.pc-north.anim { animation: fly-north 0.32s cubic-bezier(.2,.7,0,1.15) both; animation-delay: 0.05s; }
.pc-west.anim  { animation: fly-west  0.32s cubic-bezier(.2,.7,0,1.15) both; animation-delay: 0.00s; }
.pc-east.anim  { animation: fly-east  0.32s cubic-bezier(.2,.7,0,1.15) both; animation-delay: 0.10s; }
.pc-south.anim { animation: fly-south 0.32s cubic-bezier(.2,.7,0,1.15) both; animation-delay: 0.15s; }

/* Suit colors */
.pik   { color: #111; }
.kor   { color: #cc0000; }
.trefl { color: #1155aa; }
.karo  { color: #c86000; }

/* RANK TABLE */
.rank-table {
  background: white;
  border: 2px solid var(--green-table);
  border-radius: 4px;
  padding: 5px 8px;
  margin: 8px 0 14px;
  font-family: 'Source Sans 3', sans-serif;
  font-weight: 700;
  font-size: 12px;
}
.rank-row { display: flex; align-items: center; gap: 3px; }

/* FOOTER */
.footer {
  border-top: 1px solid var(--border);
  padding: 8px 16px;
  display: flex; align-items: center; justify-content: space-between;
  background: var(--cream); flex-shrink: 0;
}
.footer .nav-arrow {
  background: none; border: none; font-size: 22px;
  color: #aaa; cursor: pointer; padding: 4px 10px;
  border-radius: 4px; transition: color 0.15s;
}
.footer .nav-arrow:hover { color: var(--ink); }
.footer .nav-arrow:disabled { opacity: 0.2; cursor: default; }
.footer .home-btn {
  background: none; border: none; font-size: 20px;
  cursor: pointer; color: #888; padding: 4px 8px;
}

/* ── LESSON LIST SCREEN ── */
.screen { display: none; flex-direction: column; flex: 1; overflow: hidden; }
.screen.active { display: flex; }

.list-navbar {
  background: #2d7a4f;
  color: white;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  height: 50px;
  flex-shrink: 0;
}
.list-navbar .back-btn {
  background: none; border: none; color: white;
  font-size: 22px; cursor: pointer; padding: 4px 6px;
}
.list-navbar .list-title {
  font-family: 'Source Sans 3', sans-serif;
  font-weight: 700; font-size: 18px;
  flex: 1; text-align: center;
}
.list-navbar .menu-btn {
  background: none; border: none; color: white;
  font-size: 20px; cursor: pointer; padding: 4px 6px;
}

.list-body {
  flex: 1;
  overflow-y: auto;
  background: var(--cream);
}

/* Lesson row */
.lesson-row {
  display: flex;
  align-items: center;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  position: relative;
  background: white;
  transition: background 0.15s;
}
.lesson-row:hover { background: #f0ede6; }
.lesson-row:active { background: #e8e4dc; }
.lesson-row-text { flex: 1; padding-right: 8px; }
.lesson-row-name {
  font-family: 'Source Sans 3', sans-serif;
  font-weight: 700; font-size: 16px;
  color: var(--ink); margin-bottom: 3px;
}
.lesson-row-desc {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 13px; color: #555; line-height: 1.4;
}
.lesson-row-chevron {
  color: #bbb; font-size: 18px; flex-shrink: 0;
}
.lesson-row-badge {
  position: absolute;
  top: 10px; right: 32px;
  background: #555;
  color: white;
  font-size: 10px; font-weight: 700;
  padding: 2px 7px;
  border-radius: 10px;
  font-family: 'Source Sans 3', sans-serif;
}

/* Chapter row */
.chapter-row {
  display: flex;
  align-items: center;
  padding: 12px 16px;
  border-bottom: 1px solid #c8dfc8;
  cursor: pointer;
  background: #d4ecd4;
  transition: background 0.15s;
}
.chapter-row:hover { background: #c4e0c4; }
.chapter-row:active { background: #b8d8b8; }
.chapter-row-text { flex: 1; padding-right: 8px; }
.chapter-row-label {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 11px; font-weight: 600;
  color: #3a6b3a; text-transform: uppercase;
  letter-spacing: 0.5px; margin-bottom: 2px;
}
.chapter-row-name {
  font-family: 'Source Sans 3', sans-serif;
  font-weight: 700; font-size: 16px; color: var(--ink);
}
.chapter-row-chevron {
  color: #4a8a4a; font-size: 18px; flex-shrink: 0;
}

/* List footer — just home icon */
.list-footer {
  border-top: 1px solid var(--border);
  padding: 10px;
  text-align: center;
  background: var(--cream);
  flex-shrink: 0;
}
.list-footer .home-btn {
  background: none; border: none; font-size: 20px;
  cursor: pointer; color: #888; padding: 4px 12px;
}
</style>
</head>
<body>
<div class="book">

  <!-- ══ SCREEN 1: LESSON LIST ══ -->
  <div class="screen active" id="screen-lessons">
    <div class="list-navbar">
      <div style="width:30px"></div>
      <span class="list-title">Dersler</span>
      <button class="menu-btn" style="background:none;border:none;color:white;font-size:20px;cursor:pointer;">&#9776;</button>
    </div>
    <div class="list-body" id="lesson-list"></div>
    <div class="list-footer">
      <button class="home-btn">&#128214;</button>
    </div>
  </div>

  <!-- ══ SCREEN 2: CHAPTER LIST ══ -->
  <div class="screen" id="screen-chapters">
    <div class="list-navbar">
      <button class="back-btn" onclick="showScreen('lessons')">&#8592;</button>
      <span class="list-title" id="chapter-screen-title"></span>
      <button class="menu-btn" style="background:none;border:none;color:white;font-size:20px;cursor:pointer;">&#9776;</button>
    </div>
    <div class="list-body" id="chapter-list"></div>
    <div class="list-footer">
      <button class="home-btn" onclick="showScreen('lessons')">&#128214;</button>
    </div>
  </div>

  <!-- ══ SCREEN 3: READING ══ -->
  <div class="screen" id="screen-reading">
    <div class="navbar">
      <button class="nav-btn" onclick="showScreen('chapters')">&#8592;</button>
      <span class="title" id="nav-title"></span>
      <button class="nav-btn">&#9776;</button>
    </div>
    <div class="progress-bar">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
    <div class="content" id="page-content"></div>
    <div class="footer">
      <button class="nav-arrow" id="prev-btn" onclick="changePage(-1)">&#9664;</button>
      <button class="home-btn" onclick="showScreen('chapters')">&#128214;</button>
      <button class="nav-arrow" id="next-btn" onclick="changePage(1)">&#9654;</button>
    </div>
    <div style="text-align:center;padding:3px 0 8px;font-size:12px;color:#999;font-family:'Source Sans 3',sans-serif;">
      <span id="page-label"></span>
    </div>
  </div>

</div>

<script>
// ── SCREEN NAVIGATION ──
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}

// ── LESSON & CHAPTER DATA ──
const LESSONS = [
  {
    name: "Briç'e Giriş",
    desc: "Briç'in kurallarını ve BriçÖğren'in öğretim felsefesini öğrenin.",
    chapters: [
      { name: "BriçÖğren'e Hoş Geldiniz", pageStart: 0,  pageEnd: 5  },
      { name: "Briç Nedir?",               pageStart: 6,  pageEnd: 18 },
    ]
  },
  {
    name: "Deklerasyona Giriş",
    desc: "Yerleştirme, yükseltme, fines ve ruf gibi temel kart oynama tekniklerini öğrenin.",
    chapters: []
  },
  {
    name: "Temel Yapıcı İhale 1",
    desc: "İhalenin temellerini, elinizi nasıl değerlendireceğinizi öğrenin.",
    chapters: []
  },
  {
    name: "Temel Yapıcı İhale 2",
    desc: "Özellikle güçlü ve zayıf elleri nasıl yöneteceğinizi öğrenin.",
    chapters: []
  },
  {
    name: "Temel Rekabetçi İhale 1",
    desc: "Rakip açış yaptıktan sonra ihaleye nasıl gireceğinizi öğrenin.",
    chapters: []
  },
  {
    name: "Temel Rekabetçi İhale 2",
    desc: "Rekabetçi ihalede daha ileri teknikler.",
    chapters: []
  },
];

let currentLesson = null;
let chapterEnd = 18;

function buildLessonList() {
  document.getElementById('lesson-list').innerHTML = LESSONS.map((l, i) => `
    <div class="lesson-row" onclick="openLesson(${i})">
      <div class="lesson-row-text">
        <div class="lesson-row-name">${l.name}</div>
        <div class="lesson-row-desc">${l.desc}</div>
      </div>
      <span class="lesson-row-badge">SAHİP</span>
      <span class="lesson-row-chevron">›</span>
    </div>`).join('');
}

function openLesson(idx) {
  currentLesson = LESSONS[idx];
  document.getElementById('chapter-screen-title').textContent = currentLesson.name;
  if (currentLesson.chapters.length === 0) {
    document.getElementById('chapter-list').innerHTML =
      `<div style="padding:40px 20px;text-align:center;color:#888;font-family:'Source Sans 3',sans-serif;font-size:15px;">Bu ders henüz çevrilmedi.</div>`;
  } else {
    document.getElementById('chapter-list').innerHTML = currentLesson.chapters.map((ch, i) => `
      <div class="chapter-row" onclick="openChapter(${i})">
        <div class="chapter-row-text">
          <div class="chapter-row-label">Bölüm ${i + 1}</div>
          <div class="chapter-row-name">${ch.name}</div>
        </div>
        <span class="chapter-row-chevron">›</span>
      </div>`).join('');
  }
  showScreen('chapters');
}

function openChapter(idx) {
  const ch = currentLesson.chapters[idx];
  cur = ch.pageStart;
  chapterEnd = ch.pageEnd;
  render();
  showScreen('reading');
}

const SYM = { pik:'♠', kor:'♥', trefl:'♣', karo:'♦' };

// Horizontal card for N/S hands
function cH(rank, suit) {
  return `<span class="card-h ${suit}"><span class="cn">${rank}</span><span class="cs">${SYM[suit]}</span></span>`;
}

// Build N/S hand: groups = [{suit, ranks:[]}]
function nsHand(groups) {
  return groups.map((g,i) =>
    (i>0?'<span class="suit-gap"></span>':'')+g.ranks.map(r=>cH(r,g.suit)).join('')
  ).join('');
}

// Build W/E hand: each card is its own chip, suits in separate rows
function weHand(groups) {
  return groups.map(g =>
    `<div class="suit-line">${g.ranks.map(r =>
      `<span class="card-v ${g.suit}"><span class="cn">${r}</span><span class="cs">${SYM[g.suit]}</span></span>`
    ).join('')}</div>`
  ).join('');
}

// Single played card
function pCard(rank, suit, dir) {
  return `<div class="pcard pc-${dir} anim ${suit}"><span class="prank">${rank}</span><span class="psym">${SYM[suit]}</span></div>`;
}

// Build full table
function tbl(cfg) {
  const N = cfg.north ? `<div class="hand-north">${nsHand(cfg.north)}</div>` : '';
  const S = cfg.south ? `<div class="hand-south">${nsHand(cfg.south)}</div>` : '';
  const W = cfg.west  ? `<div class="hand-west">${weHand(cfg.west)}</div>` : '';
  const E = cfg.east  ? `<div class="hand-east">${weHand(cfg.east)}</div>` : '';
  const P = cfg.played && cfg.played.length
    ? `<div class="tbl-center"><div class="play-area">${cfg.played.map(p=>pCard(p.r,p.s,p.d)).join('')}</div></div>`
    : '';
  return `<div class="table-diagram">
    <div class="tbl-info">${cfg.info}</div>
    ${N}${W}${P}${E}${S}
    <div class="tbl-score">${cfg.score}</div>
  </div>`;
}

// ── HAND SNAPSHOTS ──
const NORTH_0 = [{suit:'pik',ranks:['4','3','2']},{suit:'kor',ranks:['5','4','3','2']},{suit:'trefl',ranks:['4','3','2']},{suit:'karo',ranks:['4','3','2']}];
const SOUTH_0 = [{suit:'pik',ranks:['Q','J','7']},{suit:'kor',ranks:['A','7','6']},{suit:'trefl',ranks:['A','K','Q']},{suit:'karo',ranks:['A','Q','8','6']}];
const WEST_0  = [{suit:'pik',ranks:['10','9','8']},{suit:'kor',ranks:['K','Q','J','9']},{suit:'trefl',ranks:['J','10']},{suit:'karo',ranks:['K','J','7','5']}];
const EAST_0  = [{suit:'pik',ranks:['A','K','6','5']},{suit:'kor',ranks:['10','8']},{suit:'trefl',ranks:['9','8','7','6','5']},{suit:'karo',ranks:['10','9']}];

const WEST_1  = [{suit:'pik',ranks:['10','9','8']},{suit:'kor',ranks:['K','Q','J','9']},{suit:'trefl',ranks:['J','10']},{suit:'karo',ranks:['K','J','7']}];

// ── NAVIGATION ──
let cur = 0;
function render() {
  const p = pages[cur];
  document.getElementById('page-content').innerHTML = p.html;
  document.getElementById('nav-title').textContent = p.nav;
  document.getElementById('page-label').textContent = `Sayfa ${cur - (currentLesson?.chapters.find(c=>c.pageStart<=cur&&c.pageEnd>=cur)?.pageStart||0) + 1}`;
  document.getElementById('prev-btn').disabled = cur === 0;
  document.getElementById('next-btn').disabled = cur === chapterEnd;
  const ch = currentLesson?.chapters.find(c => c.pageStart <= cur && c.pageEnd >= cur);
  const total = ch ? (ch.pageEnd - ch.pageStart + 1) : pages.length;
  const pos   = ch ? (cur - ch.pageStart + 1) : (cur + 1);
  document.getElementById('progress-fill').style.width = (pos / total * 100) + '%';
  document.getElementById('page-content').scrollTop = 0;
}
function changePage(dir) {
  const n = cur + dir;
  if (n >= 0 && n <= chapterEnd) { cur = n; render(); }
}
// Swipe
let _tx = 0;
document.querySelector('.book').addEventListener('touchstart', e=>{ _tx=e.touches[0].clientX; },{passive:true});
document.querySelector('.book').addEventListener('touchend', e=>{
  const dx = e.changedTouches[0].clientX - _tx;
  if (Math.abs(dx)>50) changePage(dx<0?1:-1);
},{passive:true});
