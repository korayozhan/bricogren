<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BriçÖğren - Türkçe</title>
<meta name="theme-color" content="#3a3a3a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BriçÖğren">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #2d6a4f;
    --green-table: #2d7a4f;
    --cream: #f5f0e8;
    --ink: #1a1a1a;
    --muted: #666;
    --accent: #8b2020;
    --border: #ddd;
    --bold-color: #1a1a1a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Source Sans 3', sans-serif;
    background: #e8e4dc;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 24px 16px;
  }

  .book {
    background: var(--cream);
    width: 100%;
    max-width: 420px;
    min-height: 700px;
    border-radius: 4px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.25);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* NAV BAR */
  .navbar {
    background: #3a3a3a;
    color: white;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    min-height: 52px;
  }
  .navbar .title {
    font-family: 'Source Sans 3', sans-serif;
    font-weight: 600;
    font-size: 17px;
    flex: 1;
    text-align: center;
  }
  .navbar .nav-btn {
    background: none;
    border: none;
    color: white;
    font-size: 20px;
    cursor: pointer;
    padding: 4px 8px;
    min-width: 32px;
  }

  /* CONTENT AREA */
  .content {
    flex: 1;
    padding: 20px 18px;
    font-size: 17px;
    line-height: 1.6;
    color: var(--ink);
    font-family: 'Lora', serif;
  }

  .content p { margin-bottom: 16px; }
  .content p:last-child { margin-bottom: 0; }
  .content strong { font-weight: 700; }
  .content em { font-style: italic; }

  .chapter-title-page {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 40px;
  }
  .chapter-label {
    font-family: 'Lora', serif;
    font-size: 16px;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .chapter-title {
    font-family: 'Lora', serif;
    font-size: 26px;
    font-weight: 700;
    text-align: center;
  }

  /* CARD TABLE */
  .table-diagram {
    background: var(--green-table);
    border-radius: 6px;
    padding: 10px 8px;
    margin-bottom: 14px;
    position: relative;
  }

  .table-info {
    position: absolute;
    top: 8px;
    left: 8px;
    background: rgba(255,255,255,0.15);
    color: white;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 6px;
    border-radius: 3px;
    line-height: 1.4;
    font-family: 'Source Sans 3', sans-serif;
  }

  .score-box {
    position: absolute;
    bottom: 8px;
    left: 8px;
    background: rgba(255,255,255,0.15);
    color: white;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 6px;
    border-radius: 3px;
    line-height: 1.4;
    font-family: 'Source Sans 3', sans-serif;
  }

  .hand {
    display: flex;
    flex-direction: column;
    gap: 2px;
    align-items: center;
  }

  .suit-row {
    display: flex;
    gap: 2px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .card-mini {
    background: white;
    border-radius: 2px;
    font-size: 11px;
    font-weight: 700;
    width: 16px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Source Sans 3', sans-serif;
    line-height: 1;
  }

  .card-mini.pik { color: #111; }
  .card-mini.kor { color: #cc0000; }
  .card-mini.trefl { color: #1155aa; }
  .card-mini.karo { color: #e07000; }

  .hands-layout {
    display: grid;
    grid-template-columns: auto 1fr auto;
    grid-template-rows: auto auto auto;
    gap: 4px;
    padding: 32px 4px 32px 4px;
    min-height: 160px;
    align-items: center;
  }

  .hand-north { grid-column: 2; grid-row: 1; }
  .hand-west  { grid-column: 1; grid-row: 2; }
  .hand-center { grid-column: 2; grid-row: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; min-height: 50px; }
  .hand-east  { grid-column: 3; grid-row: 2; }
  .hand-south { grid-column: 2; grid-row: 3; }

  /* played cards in center */
  .played-cards {
    display: grid;
    grid-template-columns: auto auto auto;
    grid-template-rows: auto auto auto;
    gap: 2px;
    align-items: center;
    justify-items: center;
  }
  .played-card {
    background: white;
    border-radius: 3px;
    font-size: 12px;
    font-weight: 700;
    padding: 2px 4px;
    min-width: 24px;
    text-align: center;
    font-family: 'Source Sans 3', sans-serif;
  }
  .played-card.pik { color: #111; }
  .played-card.kor { color: #cc0000; }
  .played-card.trefl { color: #1155aa; }
  .played-card.karo { color: #e07000; }

  /* card rank display */
  .rank-table {
    background: white;
    border: 2px solid #2d6a4f;
    border-radius: 4px;
    padding: 6px 8px;
    margin: 12px 0;
    text-align: center;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 13px;
    font-weight: 700;
  }
  .rank-row { display: flex; gap: 3px; justify-content: center; flex-wrap: wrap; }

  /* FOOTER */
  .footer {
    border-top: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--cream);
  }
  .footer .page-num {
    font-size: 14px;
    color: var(--muted);
    font-family: 'Source Sans 3', sans-serif;
  }
  .footer .nav-arrow {
    background: none;
    border: none;
    font-size: 22px;
    color: var(--muted);
    cursor: pointer;
    padding: 4px 10px;
    border-radius: 4px;
    transition: color 0.15s;
  }
  .footer .nav-arrow:hover { color: var(--ink); }
  .footer .nav-arrow:disabled { opacity: 0.2; cursor: default; }
  .footer .home-btn {
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    color: var(--muted);
    padding: 4px 8px;
  }

  /* progress bar */
  .progress-bar {
    height: 4px;
    background: #ddd;
    position: relative;
  }
  .progress-bar-fill {
    height: 100%;
    background: #888;
    transition: width 0.3s;
  }

  /* bullet list */
  .content ul { margin: 0 0 16px 20px; }
  .content li { margin-bottom: 8px; }
</style>
</head>

// helper to generate mini card spans
function mini(ranks, suit) {
  const sym = {pik:'♠', kor:'♥', trefl:'♣', karo:'♦'};
  return ranks.map(r => `<span class="card-mini ${suit}">${r}${sym[suit]}</span>`).join('');
}

let currentPage = 0;

function render() {
  const p = pages[currentPage];
  document.getElementById('page-content').innerHTML = p.html;
  document.getElementById('nav-title').textContent = p.navTitle;
  document.getElementById('page-label').textContent = `Sayfa ${currentPage + 1}`;
  document.getElementById('prev-btn').disabled = currentPage === 0;
  document.getElementById('next-btn').disabled = currentPage === pages.length - 1;
  const pct = ((currentPage + 1) / pages.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
}

function changePage(dir) {
  const next = currentPage + dir;
  if (next >= 0 && next < pages.length) {
    currentPage = next;
    render();
    document.querySelector('.content').scrollTop = 0;
  }
}

function goBack() {
  if (currentPage > 0) changePage(-1);
}

render();
</script>
